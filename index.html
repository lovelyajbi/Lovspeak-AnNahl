
<!DOCTYPE html>
<html lang="en" translate="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      html {
        transition: font-size 0.3s ease-in-out;
      }
    </style>
    <meta name="google" content="notranslate" />
    <meta http-equiv="Content-Language" content="en" />
    <meta name="theme-color" content="#ec4899" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="LovSpeak" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="manifest" href="/manifest.json" />
    <title>LovSpeak - Islamic English Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              lovelya: {
                50: 'var(--color-lovelya-50)',
                100: 'var(--color-lovelya-100)',
                200: 'var(--color-lovelya-200)',
                300: 'var(--color-lovelya-300)',
                400: 'var(--color-lovelya-400)',
                500: 'var(--color-lovelya-500)',
                600: 'var(--color-lovelya-600)',
                700: 'var(--color-lovelya-700)',
                800: 'var(--color-lovelya-800)',
                900: 'var(--color-lovelya-900)',
              },
              gray: {
                50: '#F9FAFB',
                100: '#F3F4F6',
                200: '#E5E7EB',
                300: '#D1D5DB',
                400: '#9CA3AF',
                500: '#6B7280',
                600: '#4B5563',
                700: '#374151',
                800: '#1F2937', 
                900: '#111827',
              },
              accent: {
                purple: '#8b5cf6',
                teal: '#10b981',
                rose: '#f43f5e',
                amber: '#f59e0b'
              }
            },
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            },
            boxShadow: {
              'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
              'glow': '0 0 15px rgba(59, 130, 246, 0.5)',
              'card': '0 0 0 1px rgba(0,0,0,0.03), 0 2px 8px rgba(0,0,0,0.04)',
            },
            backgroundImage: {
              'mesh': 'radial-gradient(at 40% 20%, hsla(210,100%,96%,1) 0px, transparent 50%), radial-gradient(at 80% 0%, hsla(189,100%,96%,1) 0px, transparent 50%), radial-gradient(at 0% 50%, hsla(341,100%,96%,1) 0px, transparent 50%)',
              'mesh-dark': 'radial-gradient(at 40% 20%, hsla(210,100%,10%,1) 0px, transparent 50%), radial-gradient(at 80% 0%, hsla(189,100%,10%,1) 0px, transparent 50%), radial-gradient(at 0% 50%, hsla(341,100%,10%,1) 0px, transparent 50%)',
              'glass': 'linear-gradient(145deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.1) 100%)',
              'glass-dark': 'linear-gradient(145deg, rgba(17,24,39,0.6) 0%, rgba(17,24,39,0.1) 100%)'
            }
          }
        }
      }
    </script>
    <style>
      /* Pink Color Palette (#ec4899) */
      :root {
        --color-lovelya-50: #fdf2f8;
        --color-lovelya-100: #fce7f3;
        --color-lovelya-200: #fbcfe8;
        --color-lovelya-300: #f9a8d4;
        --color-lovelya-400: #f472b6;
        --color-lovelya-500: #ec4899;
        --color-lovelya-600: #db2777;
        --color-lovelya-700: #be185d;
        --color-lovelya-800: #9d174d;
        --color-lovelya-900: #831843;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #374151; 
      }
      
      /* Utilities */
      .animate-fade-in { animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
      .animate-slide-up { animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
      .animate-bounce-in { animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
      
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes bounceIn { 
        0% { transform: scale(0.95); opacity: 0; } 
        100% { transform: scale(1); opacity: 1; } 
      }
      
      /* Epic Badge Animations */
      .animate-badge-glow { animation: badgeGlow 2s ease-in-out infinite alternate; }
      .animate-badge-flame { animation: badgeFlame 0.8s ease-in-out infinite alternate; }
      .animate-badge-float { animation: badgeFloat 3s ease-in-out infinite; }
      .animate-badge-spin-slow { animation: badgeSpinSlow 12s linear infinite; }
      
      @keyframes badgeGlow {
        0% { filter: drop-shadow(0 0 4px rgba(251, 191, 36, 0.4)); transform: scale(1); }
        100% { filter: drop-shadow(0 0 18px rgba(251, 191, 36, 1)); transform: scale(1.05); }
      }
      @keyframes badgeFlame {
        0% { transform: scale(1) rotate(-2deg); filter: brightness(1) drop-shadow(0 0 5px rgba(249, 115, 22, 0.5)); color: #ea580c; }
        100% { transform: scale(1.15) rotate(2deg); filter: brightness(1.2) drop-shadow(0 -5px 15px rgba(239, 68, 68, 0.9)); color: #facc15; }
      }
      @keyframes badgeFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      @keyframes badgeSpinSlow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      /* Glassmorphism Classes */
      .glass-panel {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }
      .dark .glass-panel {
        background: rgba(31, 41, 55, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
    </style>

<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-gray-50 dark:bg-gray-900 bg-mesh dark:bg-mesh-dark bg-fixed text-gray-900 dark:text-gray-100 transition-colors duration-300 antialiased selection:bg-lovelya-200 selection:text-lovelya-900">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
